---
# cPanel Git™ Version Control — auto-deployment for munu-photo
# Runs every time you git push to the cPanel remote.
# ⚠ Set DEPLOY_PATH and PHP_BIN below to match your server.
deployment:
  tasks:
    # ── 1. PHP / Composer path (adjust if needed — check via: which php82) ───
    - export PHP_BIN=/usr/local/bin/php
    - export COMPOSER_BIN=/usr/local/bin/composer

    # ── 2. Install PHP deps (no dev, optimised autoloader) ───────────────────
    - $PHP_BIN $COMPOSER_BIN install --no-dev --optimize-autoloader --no-interaction

    # ── 3. Ensure APP_KEY exists (safe to re-run) ────────────────────────────
    - $PHP_BIN artisan key:generate --no-interaction --force

    # ── 4. Run migrations ─────────────────────────────────────────────────────
    - $PHP_BIN artisan migrate --force

    # ── 5. Clear & rebuild all caches ────────────────────────────────────────
    - $PHP_BIN artisan optimize:clear
    - $PHP_BIN artisan config:cache
    - $PHP_BIN artisan route:cache
    - $PHP_BIN artisan view:cache
    - $PHP_BIN artisan event:cache

    # ── 6. Storage symlink ───────────────────────────────────────────────────
    - $PHP_BIN artisan storage:link --force

    # ── 7. Fix permissions ───────────────────────────────────────────────────
    - find storage bootstrap/cache -type d -exec chmod 775 {} \;
    - find storage bootstrap/cache -type f -exec chmod 664 {} \;
